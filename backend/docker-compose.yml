
services:
  db:
    image: postgres:15
    container_name: workflow_db
    environment:
      POSTGRES_DB: workflowdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d workflowdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: workflow_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/workflowdb
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ../workflow-frontend
    container_name: workflow_frontend
    ports:
      - "3000:80"
    depends_on:
      - app

volumes:
  postgres_data: